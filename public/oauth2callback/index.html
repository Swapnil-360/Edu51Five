<!DOCTYPE html>
<html>
<head>
  <title>Signing in…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; font-family: sans-serif; background: #0f172a; color: #94a3b8; }
    p { font-size: 14px; }
  </style>
</head>
<body>
  <p>Signing in… this window will close automatically.</p>
  <script>
    try {
      var raw = location.hash || location.search;
      var params = new URLSearchParams(raw.replace(/^[#?]/, ''));
      var token = params.get('access_token');
      var error = params.get('error');
      var expiresIn = params.get('expires_in');
      if (window.opener) {
        window.opener.postMessage(
          token
            ? { type: 'GDRIVE_OAUTH_SUCCESS', token: token, expiresIn: expiresIn }
            : { type: 'GDRIVE_OAUTH_ERROR', error: error || 'Unknown error' },
          window.location.origin
        );
      }
    } catch (e) {}
    setTimeout(function () { window.close(); }, 200);
  </script>
</body>
</html>
